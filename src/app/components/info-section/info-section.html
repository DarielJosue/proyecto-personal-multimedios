<section
  [id]="sectionId()"
  class="info-section"
  [class.info-section--tinted]="tinted()"
  [class.info-section--reverse]="reverse()"
>
  <div class="info-section__container container">
    <div class="info-section__text">
      <h2 class="info-section__title">{{ title() }}</h2>

      @for (paragraph of paragraphs(); track paragraph) {
        <p class="info-section__paragraph">{{ paragraph }}</p>
      }

      <ng-content />
    </div>

    @if (imageSrc(); as src) {
      <div class="info-section__media">
        <img [src]="src" [alt]="imageAlt()" loading="lazy" />
      </div>
    }
  </div>
</section>
