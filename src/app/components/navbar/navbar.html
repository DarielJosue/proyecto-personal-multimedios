<header class="navbar">
  <div class="navbar__container">
    <a class="navbar__brand" href="#inicio" (click)="closeMenu()">PI &amp; Emprendimiento</a>

    <button
      type="button"
      class="navbar__toggle"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()"
      aria-controls="navbar-menu"
      [attr.aria-label]="isMenuOpen() ? 'Cerrar menú' : 'Abrir menú'"
    >
      <span class="navbar__toggle-bar"></span>
      <span class="navbar__toggle-bar"></span>
      <span class="navbar__toggle-bar"></span>
    </button>

    <nav
      class="navbar__nav"
      [class.navbar__nav--open]="isMenuOpen()"
      aria-label="Navegación principal"
    >
      <ul id="navbar-menu" class="navbar__menu">
        @for (link of navLinks; track link.fragment) {
          <li class="navbar__item">
            <a class="navbar__link" [href]="'#' + link.fragment" (click)="closeMenu()">{{
              link.label
            }}</a>
          </li>
        }
      </ul>
    </nav>
  </div>
</header>
