<app-navbar />

@if (content$ | async; as content) {
  <main>
    <app-hero
      [title]="content.hero.title"
      [subtitle]="content.hero.subtitle"
      [ctaLabel]="content.hero.ctaLabel"
      [ctaFragment]="content.hero.ctaFragment"
    />

    @for (section of content.sections; track section.sectionId) {
      <app-info-section
        [sectionId]="section.sectionId"
        [title]="section.title"
        [paragraphs]="section.paragraphs"
        [tinted]="section.tinted ?? false"
        [reverse]="section.reverse ?? false"
        [imageSrc]="section.imageSrc ?? null"
        [imageAlt]="section.imageAlt ?? ''"
      />
    } @empty {
      <p class="home__status container">No hay secciones para mostrar.</p>
    }
  </main>
} @else {
  <main>
    <p class="home__status container">Cargando contenido…</p>
  </main>
}

<app-footer />
